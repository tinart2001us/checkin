<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เช็คอินเข้า-ออกงาน</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#10241f;
    --paper:#f4f7f5;
    --panel:#ffffff;
    --line:#dfe6e2;
    --deep:#14332b;
    --accent:#2f8f6e;
    --accent-dim:#e4f2ec;
    --warn:#c4562f;
    --warn-dim:#fbe9e2;
    --muted:#6b7a75;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    font-family:'Prompt', sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--panel);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  header{
    padding:28px 24px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand-mark{
    width:34px; height:34px;
    border-radius:9px;
    background:var(--deep);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:14px;
  }

  .brand-text{ line-height:1.2; }
  .brand-text .t1{ font-size:15px; font-weight:600; }
  .brand-text .t2{ font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; letter-spacing:.02em; }

  #clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--muted);
    text-align:right;
    line-height:1.3;
  }
  #clock .time{ font-size:18px; color:var(--ink); font-weight:500; }

  main{
    flex:1;
    padding:32px 24px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .profile{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    margin-bottom:28px;
  }
  .avatar{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--accent-dim);
    border:1px solid var(--line);
    object-fit:cover;
  }
  .profile-name{ font-weight:600; font-size:16px; }
  .profile-sub{ font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }

  /* signature element: geofence ring */
  .ring-wrap{
    position:relative;
    width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:26px;
  }
  svg.ring{ position:absolute; inset:0; transform:rotate(-90deg); }
  svg.ring circle{
    fill:none;
    stroke-width:3;
  }
  .ring-track{ stroke:var(--line); }
  .ring-progress{
    stroke:var(--accent);
    stroke-linecap:round;
    transition:stroke-dashoffset .6s ease, stroke .3s ease;
  }
  .ring-center{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    z-index:2;
  }
  .ring-status-label{
    font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.08em;
    font-family:'IBM Plex Mono',monospace;
  }
  .ring-distance{
    font-size:28px; font-weight:600;
    font-family:'IBM Plex Mono',monospace;
  }
  .ring-distance .unit{ font-size:13px; color:var(--muted); margin-left:2px; }
  .ring-verdict{
    margin-top:4px;
    font-size:12px; font-weight:500;
    padding:3px 10px;
    border-radius:20px;
  }
  .ring-verdict.ok{ background:var(--accent-dim); color:var(--accent); }
  .ring-verdict.out{ background:var(--warn-dim); color:var(--warn); }
  .ring-verdict.pending{ background:var(--line); color:var(--muted); }

  .btn-row{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:16px;
  }

  button.action{
    border:none;
    border-radius:14px;
    padding:16px 0;
    font-family:'Prompt', sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  button.action:active{ transform:scale(0.97); }
  button.action:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

  #btn-in{ background:var(--deep); color:#fff; }
  #btn-out{ background:var(--panel); color:var(--deep); border:1.5px solid var(--deep); }
  button.action .sub{ font-size:10px; font-weight:400; opacity:.75; font-family:'IBM Plex Mono',monospace; }

  #status-msg{
    width:100%;
    min-height:20px;
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:18px;
  }
  #status-msg.err{ color:var(--warn); }
  #status-msg.ok{ color:var(--accent); }

  .log{
    width:100%;
    border-top:1px solid var(--line);
    padding-top:14px;
    margin-top:auto;
  }
  .log-title{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); font-family:'IBM Plex Mono',monospace;
    margin-bottom:10px;
  }
  .log-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    font-size:13px;
  }
  .log-item:last-child{ border-bottom:none; }
  .log-item .lt{ color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .log-item .badge{ font-size:11px; padding:2px 8px; border-radius:10px; }
  .log-item .badge.ok{ background:var(--accent-dim); color:var(--accent); }
  .log-item .badge.out{ background:var(--warn-dim); color:var(--warn); }

  .summary-card{
    width:100%;
    background:var(--accent-dim);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 14px;
    margin-bottom:18px;
  }
  .summary-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .summary-title{ font-size:13px; font-weight:600; }
  .summary-month{ font-weight:400; color:var(--muted); font-size:11.5px; margin-left:2px; }
  .summary-refresh{
    border:none; background:none;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px; color:var(--accent);
    cursor:pointer; padding:4px 8px;
    border-radius:8px;
  }
  .summary-refresh:disabled{ opacity:.5; cursor:not-allowed; }
  .summary-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .summary-stat{
    background:var(--panel);
    border-radius:10px;
    padding:10px 4px;
    text-align:center;
  }
  .summary-stat.has-issue{ background:var(--warn-dim); }
  .summary-stat.has-issue .summary-num{ color:var(--warn); }
  .summary-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:17px; font-weight:600;
  }
  .summary-label{
    font-size:10px; color:var(--muted);
    margin-top:2px;
  }

  .spinner{
    width:16px; height:16px;
    border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:inline-block;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  footer{
    text-align:center;
    font-size:10.5px;
    color:var(--muted);
    padding:14px;
    font-family:'IBM Plex Mono',monospace;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <div class="t1">ระบบเข้า-ออกงาน</div>
        <div class="t2">GPS ATTENDANCE</div>
      </div>
    </div>
    <div id="clock">
      <div class="time" id="clock-time">--:--:--</div>
      <div id="clock-date">-- --- ----</div>
    </div>
  </header>

  <main>
    <div class="profile">
      <img class="avatar" id="avatar" src="" alt="">
      <div class="profile-name" id="disp-name">กำลังโหลดโปรไฟล์...</div>
      <div class="profile-sub" id="disp-id">-</div>
    </div>

    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 220 220">
        <circle class="ring-track" cx="110" cy="110" r="96"></circle>
        <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="96"
                stroke-dasharray="603" stroke-dashoffset="603"></circle>
      </svg>
      <div class="ring-center">
        <div class="ring-status-label">ระยะจากที่ทำงาน</div>
        <div class="ring-distance" id="dist-val">– <span class="unit">ม.</span></div>
        <div class="ring-verdict pending" id="verdict">รอตำแหน่ง GPS</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="action" id="btn-in" disabled onclick="submitCheck('เข้างาน')">
        เข้างาน
        <span class="sub">CHECK IN</span>
      </button>
      <button class="action" id="btn-out" disabled onclick="submitCheck('ออกงาน')">
        ออกงาน
        <span class="sub">CHECK OUT</span>
      </button>
    </div>

    <div id="status-msg">กำลังขอสิทธิ์เข้าถึงตำแหน่ง...</div>

    <div class="summary-card" id="summary-card">
      <div class="summary-head">
        <span class="summary-title">สรุปเดือนนี้<span class="summary-month" id="summary-month"></span></span>
        <button class="summary-refresh" id="summary-refresh" onclick="loadMonthlySummary()">รีเฟรช</button>
      </div>
      <div class="summary-grid">
        <div class="summary-stat">
          <div class="summary-num" id="sum-days">–</div>
          <div class="summary-label">วันที่มา</div>
        </div>
        <div class="summary-stat">
          <div class="summary-num" id="sum-hours">–</div>
          <div class="summary-label">ชม.รวม</div>
        </div>
        <div class="summary-stat">
          <div class="summary-num" id="sum-avg">–</div>
          <div class="summary-label">ชม./วัน</div>
        </div>
        <div class="summary-stat" id="sum-anomaly-wrap">
          <div class="summary-num" id="sum-anomaly">–</div>
          <div class="summary-label">ผิดปกติ</div>
        </div>
      </div>
    </div>

    <div class="log">
      <div class="log-title">ประวัติวันนี้ / TODAY'S LOG</div>
      <div id="log-list">
        <div class="log-item"><span class="lt">ยังไม่มีรายการ</span></div>
      </div>
    </div>
  </main>

  <footer>SECURED VIA LINE LIFF · GEOFENCE VERIFIED</footer>
</div>

<script>
/* ====================== CONFIG — แก้ค่าตรงนี้ ====================== */
const CONFIG = {
  LIFF_ID: "2010697570-Ds4XvCSv",                         // จาก LINE Developers Console
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbx0vCyB91CSShY3fK5nOFPsKOOJoAS3sL8HRZmqBxr47RLaxdRQKUvFO1kqdcSacVZKAg/exec",  // จาก Google Apps Script Deploy
  OFFICE_LAT: 14.023130,                              // พิกัด latitude ของบริษัท
  OFFICE_LNG: 99.555469,                             // พิกัด longitude ของบริษัท
  RADIUS_METERS: 300                                // รัศมีที่ยอมรับ (เมตร)
};

/* ===================================================================== */

const RING_CIRCUMFERENCE = 603; // 2 * PI * 96, precomputed
let currentPosition = null;
let profile = null;
let todayLog = [];

function updateClock(){
  const now = new Date();
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

function getDistanceMeters(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function setStatus(msg, type){
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type || '';
}

function renderRing(distance){
  const inRange = distance <= CONFIG.RADIUS_METERS;
  const ratio = Math.max(0, Math.min(1, 1 - (distance / (CONFIG.RADIUS_METERS * 4))));
  const offset = RING_CIRCUMFERENCE * (1 - ratio);

  const ring = document.getElementById('ring-progress');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = inRange ? 'var(--accent)' : 'var(--warn)';

  document.getElementById('dist-val').innerHTML =
    Math.round(distance) + ' <span class="unit">ม.</span>';

  const verdict = document.getElementById('verdict');
  if(inRange){
    verdict.textContent = 'อยู่ในพื้นที่ทำงาน';
    verdict.className = 'ring-verdict ok';
  } else {
    verdict.textContent = 'อยู่นอกพื้นที่ทำงาน';
    verdict.className = 'ring-verdict out';
  }

  document.getElementById('btn-in').disabled = false;
  document.getElementById('btn-out').disabled = false;
}

function locateAndTrack(){
  if(!navigator.geolocation){
    setStatus('อุปกรณ์นี้ไม่รองรับ GPS', 'err');
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      currentPosition = pos.coords;
      const dist = getDistanceMeters(
        pos.coords.latitude, pos.coords.longitude,
        CONFIG.OFFICE_LAT, CONFIG.OFFICE_LNG
      );
      renderRing(dist);
      setStatus('ตำแหน่งอัปเดตแล้ว · ความแม่นยำ ±' + Math.round(pos.coords.accuracy) + ' ม.', '');
    },
    err => {
      setStatus('ไม่สามารถเข้าถึงตำแหน่งได้ กรุณาเปิด GPS และอนุญาตสิทธิ์', 'err');
    },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}

function addLogEntry(type, statusOk, timeStr){
  const list = document.getElementById('log-list');
  if(todayLog.length === 0) list.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'log-item';
  row.innerHTML = `
    <span>${type} <span class="lt">· ${timeStr}</span></span>
    <span class="badge ${statusOk ? 'ok' : 'out'}">${statusOk ? 'ผ่าน' : 'นอกพื้นที่'}</span>
  `;
  list.prepend(row);
  todayLog.push(type);
}

async function submitCheck(type){
  if(!currentPosition){
    setStatus('ยังไม่มีตำแหน่ง GPS กรุณารอสักครู่', 'err');
    return;
  }

  const btnIn = document.getElementById('btn-in');
  const btnOut = document.getElementById('btn-out');
  btnIn.disabled = true; btnOut.disabled = true;
  const activeBtn = type === 'เข้างาน' ? btnIn : btnOut;
  const originalHTML = activeBtn.innerHTML;
  activeBtn.innerHTML = '<span class="spinner"></span>';

  const dist = getDistanceMeters(
    currentPosition.latitude, currentPosition.longitude,
    CONFIG.OFFICE_LAT, CONFIG.OFFICE_LNG
  );
  const inRange = dist <= CONFIG.RADIUS_METERS;

  const payload = {
    userId: profile ? profile.userId : 'unknown',
    displayName: profile ? profile.displayName : 'unknown',
    type: type,
    lat: currentPosition.latitude,
    lng: currentPosition.longitude,
    accuracy: currentPosition.accuracy
  };

  try{
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      // ใช้ text/plain เพื่อเลี่ยง CORS preflight (Apps Script ไม่รองรับ OPTIONS โดยตรง)
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();

    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    addLogEntry(type, inRange, timeStr);

    if(result.note){
      // มีความผิดปกติด้านลำดับ เช่น ออกงานโดยไม่มีเข้างาน, กดซ้ำ ฯลฯ
      setStatus(`บันทึกแล้ว แต่ ${result.note} — ระบบแจ้ง HR ไว้แล้ว`, 'err');
    } else if(!inRange){
      setStatus(`บันทึก "${type}" แล้ว แต่อยู่นอกพื้นที่ที่กำหนด — แจ้ง HR แล้ว`, 'err');
    } else if(result.workHours){
      setStatus(`บันทึก "${type}" สำเร็จ เวลา ${timeStr} · ทำงานรวม ${result.workHours} ชม.`, 'ok');
      loadMonthlySummary();
    } else {
      setStatus(`บันทึก "${type}" สำเร็จ เวลา ${timeStr}`, 'ok');
    }
  } catch(e){
    setStatus('ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่ (เช็คว่า Apps Script deploy เป็น "Anyone" หรือยัง)', 'err');
  } finally {
    activeBtn.innerHTML = originalHTML;
    btnIn.disabled = false; btnOut.disabled = false;
  }
}

function formatMonthLabel(monthStr){
  if(!monthStr) return '';
  const [y, m] = monthStr.split('-');
  const d = new Date(parseInt(y), parseInt(m) - 1, 1);
  return ' · ' + d.toLocaleDateString('th-TH', { month:'long', year:'numeric' });
}

async function loadMonthlySummary(){
  if(!profile) return;
  const btn = document.getElementById('summary-refresh');
  const originalText = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;

  try{
    const url = CONFIG.APPS_SCRIPT_URL + '?action=summary&userId=' + encodeURIComponent(profile.userId);
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById('summary-month').textContent = formatMonthLabel(data.month);
    document.getElementById('sum-days').textContent = data.days || 0;
    document.getElementById('sum-hours').textContent = data.totalHours || 0;
    document.getElementById('sum-avg').textContent = data.avgHours || 0;
    document.getElementById('sum-anomaly').textContent = data.anomalies || 0;
    document.getElementById('sum-anomaly-wrap').classList.toggle('has-issue', (data.anomalies || 0) > 0);
  } catch(e){
    document.getElementById('summary-month').textContent = ' · โหลดไม่สำเร็จ';
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

async function initLiff(){
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }
    profile = await liff.getProfile();
    document.getElementById('avatar').src = profile.pictureUrl || '';
    document.getElementById('disp-name').textContent = profile.displayName;
    document.getElementById('disp-id').textContent = 'ID: ' + profile.userId.slice(0, 10) + '…';
    locateAndTrack();
    loadMonthlySummary();
  } catch(e){
    setStatus('เริ่มต้น LIFF ไม่สำเร็จ: ' + e.message, 'err');
    // สำหรับทดสอบนอก LINE: ใช้โปรไฟล์จำลอง
    profile = { userId: 'test-user', displayName: 'ผู้ใช้ทดสอบ' };
    document.getElementById('disp-name').textContent = profile.displayName;
    document.getElementById('disp-id').textContent = 'ID: (โหมดทดสอบ)';
    locateAndTrack();
    loadMonthlySummary();
  }
}

initLiff();
</script>
</body>
</html>
